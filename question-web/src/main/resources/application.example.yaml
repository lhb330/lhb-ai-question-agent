server:
  port: 9123
  servlet:
    context-path: /api

spring:
  application:
    name: lhb-ai-question-agent

  datasource:
    url: jdbc:postgresql://localhost:5432/your_database_name?useUnicode=true&characterEncoding=utf8&reWriteBatchedInserts=true&serverTimezone=Asia/Shanghai
    driver-class-name: org.postgresql.Driver
    username: your_db_username
    password: your_db_password
    hikari:
      pool-name: TestHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
      connection-test-query: SELECT 1
      auto-commit: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # password: your_redis_password
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0

  ai:
    dashscope:
      api-key: your_dashscope_api_key
      chat:
        options:
          model: qwen-plus

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.lhb.questionweb.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

sa-token:
  token-name: satoken
  timeout: 86400
  is-concurrent: true
  is-share: false
  is-auto-renew: true
  is-write-header: true
  is-log: true
  jwt-secret-key: your_jwt_secret_key

mybatis-plus:
  mapper-locations: classpath*:/mappers/**/*.xml
  type-aliases-package: com.lhb.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  vector:
    duplicate-threshold: 0.20
    knowledge-threshold: 0.35
